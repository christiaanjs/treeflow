name: Native likelihood op

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "treeflow/acceleration/native/**"
      - "treeflow/distributions/leaf_ctmc.py"
      - "test/acceleration/native/**"
      - ".github/workflows/native-op.yaml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build toolchain
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Install treeflow (with test extras)
        run: |
          python -m pip install --upgrade pip setuptools --ignore-installed
          python -m pip install -e ".[test]"

      - name: Build native op
        run: bash treeflow/acceleration/native/build.sh

      - name: Run native op tests
        run: pytest -m native -p no:cacheprovider

      - name: Run distribution regression tests
        run: pytest test/distributions/test_leaf_ctmc.py test/traversal/test_phylo_likelihood.py
