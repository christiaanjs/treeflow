name: Run tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install package and test dependencies
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest -m "not bito"
