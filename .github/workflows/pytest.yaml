name: Run tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build and cache test image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: unit
            pytest_args: ""
          - name: cli
            pytest_args: --override-ini="addopts=" -m "cli and not bito"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Load test image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          target: test
          load: true
          tags: treeflow-test:ci
          cache-from: type=gha
      - name: Run pytest (${{ matrix.name }})
        run: docker run --rm --workdir /app treeflow-test:ci pytest ${{ matrix.pytest_args }}
