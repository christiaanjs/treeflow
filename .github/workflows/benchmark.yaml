name: Inference profiling

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "treeflow/**"
      - "setup.cfg"
      - "setup.py"
      - "pyproject.toml"
      - ".github/workflows/benchmark.yaml"
  push:
    branches:
      - main
      - master
      - "release/**"
  workflow_dispatch:

jobs:
  profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build toolchain
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Install treeflow (with test extras)
        run: |
          python -m pip install --upgrade pip setuptools --ignore-installed
          python -m pip install -e ".[test]"

      - name: Build native op
        run: bash treeflow/acceleration/native/build.sh

      - name: Run inference profiler
        run: |
          treeflow_profile \
            --taxa 16,32,64,128 \
            --sites 1000 \
            --engines native,static,dynamic \
            --replicates 30 \
            --output inference-profile.csv

      - name: Upload profiling results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inference-profile
          path: inference-profile.csv
